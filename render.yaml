services:
  - type: web
    name: power-automate-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn power_automate_mcp_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POWER_AUTOMATE_ENDPOINT
        sync: false   # Marks it as a secret — you fill in the value in the Render dashboard
    healthCheckPath: /mcp
